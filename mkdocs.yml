site_name: Priveil
site_description: Pseudonymisation service for Australian financial services
site_url: https://mitchelllisle.github.io/priveil
repo_url: https://github.com/mitchelllisle/priveil
repo_name: mitchelllisle/priveil

docs_dir: docs

nav:
  - Overview: index.md
  - Domain: domain/priveil.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true
